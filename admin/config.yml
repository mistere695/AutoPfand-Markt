backend:
  name: git-gateway
  branch: main # branche GitHub où se trouvent tes fichiers

media_folder: "images"       # dossier pour stocker les photos
public_folder: "/images"

collections:
  - name: "voitures"
    label: "Véhicules"
    folder: "_voitures"      # dossier pour stocker chaque voiture
    create: true
    slug: "{{slug}}"
    fields:
      - {label: "Nom", name: "name", widget: "string"}
      - {label: "Année", name: "year", widget: "number"}
      - {label: "Kilométrage", name: "km", widget: "number"}
      - {label: "Prix (€)", name: "price", widget: "number"}
      - {label: "Statut", name: "status", widget: "select", options: ["Disponible", "Réservé", "Vendu"]}
      - {label: "Image", name: "image", widget: "image"}